global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8000
        labels:
          instance: vllm-qwen

  - job_name: dcgm-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9400
        labels:
          instance: local-gpu
